<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบสำรวจความสนใจเข้าร่วมชมรม MedX Innovestor</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
            background: #ffffff;
        }

        /* ===== Premium Medical Background ===== */
        .medical-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background:
                radial-gradient(circle at 12% 8%, rgba(0, 102, 204, 0.07), transparent 38%),
                radial-gradient(circle at 88% 12%, rgba(255, 145, 0, 0.06), transparent 40%),
                radial-gradient(circle at 50% 95%, rgba(0, 191, 255, 0.08), transparent 50%),
                #ffffff;
        }

        /* Medical Grid Overlay */
        .medical-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 51, 102, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 51, 102, 0.02) 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.8;
        }

        /* App Layout Container */
        .app-container {
            width: 100%;
            max-width: 540px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 51, 102, 0.05);
            border-left: 1px solid rgba(0, 102, 204, 0.05);
            border-right: 1px solid rgba(0, 102, 204, 0.05);
        }

        /* Modern Custom Alert styling */
        .custom-alert {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #ffffff;
            padding: 14px 20px;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: calc(100% - 48px);
            max-width: 400px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .custom-alert.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        .custom-alert-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .custom-alert.error .custom-alert-icon { background: #ffebee; color: #e53935; }
        .custom-alert.success .custom-alert-icon { background: #e8f5e9; color: #43a047; }
        .custom-alert-message {
            font-size: 14px;
            font-weight: 500;
            color: #2c3e50;
            line-height: 1.4;
        }

        /* Screen States */
        .app-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
        }

        #startScreen { display: flex; justify-content: center; align-items: center; text-align: center; }
        #formScreen { display: none; }
        #thankyouScreen { display: none; justify-content: center; align-items: center; text-align: center; }

        /* Welcome & End Screen Cards */
        .welcome-card, .thankyou-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 40px 24px;
            box-shadow: 0 16px 40px rgba(0, 51, 102, 0.06);
            border: 1px solid rgba(0, 102, 204, 0.08);
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .welcome-card::before, .thankyou-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #0052cc, #00bfff);
        }

        /* Branding Elements */
        .brand-logo-container {
            width: 84px;
            height: 84px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, rgba(0, 82, 204, 0.06), rgba(0, 191, 255, 0.06));
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0, 102, 204, 0.1);
        }

        .brand-logo-container svg { width: 44px; height: 44px; color: #0052cc; }

        .app-title {
            font-size: 24px;
            font-weight: 800;
            color: #002244;
            line-height: 1.3;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .app-subtitle {
            font-size: 14px;
            color: #556677;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* Modern Progress Bar for Form Header */
        .form-header {
            margin-bottom: 24px;
            background: #ffffff;
            padding: 16px 20px;
            border-radius: 18px;
            border: 1px solid rgba(0, 102, 204, 0.06);
            box-shadow: 0 4px 15px rgba(0, 51, 102, 0.02);
        }
        .form-header-title {
            font-size: 16px;
            font-weight: 700;
            color: #002244;
            margin-bottom: 2px;
        }
        .form-header-desc { font-size: 12px; color: #778899; }

        /* Form Controls */
        .form-group {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(0, 102, 204, 0.06);
            box-shadow: 0 4px 20px rgba(0, 51, 102, 0.02);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group:focus-within {
            border-color: rgba(0, 82, 204, 0.3);
            box-shadow: 0 8px 25px rgba(0, 82, 204, 0.06);
        }

        .section-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: rgba(0, 82, 204, 0.06);
            color: #0052cc;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-label {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: #002244;
            line-height: 1.4;
            margin-bottom: 6px;
        }
        
        .form-label .required { color: #e53935; margin-left: 2px; }

        .form-desc {
            font-size: 12px;
            color: #667788;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        /* Inputs & Selects */
        .input-wrapper { position: relative; width: 100%; }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8899aa;
            display: flex;
            align-items: center;
            pointer-events: none;
        }
        .input-icon svg { width: 18px; height: 18px; }

        .text-input, .select-input, .textarea-input {
            width: 100%;
            background: #f4f7fa;
            border: 1px solid #e1e8ed;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            color: #2c3e50;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .text-input { padding-left: 42px; }

        .text-input:focus, .select-input:focus, .textarea-input:focus {
            background: #ffffff;
            border-color: #0052cc;
            box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.1);
            outline: none;
        }

        .textarea-input { resize: vertical; min-height: 80px; }

        /* Modern Selection Buttons (Pills / Cards) */
        .selection-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .selection-grid.two-cols { grid-template-columns: repeat(2, 1fr); }

        .sel-btn {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            background: #f4f7fa;
            border: 1px solid #e1e8ed;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            user-select: none;
        }

        .sel-btn-circle {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #b0bec5;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        .sel-btn-circle::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffffff;
            transform: scale(0);
            transition: transform 0.2s ease;
        }

        .sel-btn-square {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 2px solid #b0bec5;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            color: #ffffff;
        }
        .sel-btn-square svg { width: 12px; height: 12px; stroke-width: 3; display: none; }

        .sel-btn-text { font-size: 13.5px; font-weight: 600; color: #455a64; line-height: 1.3; }

        /* Hide Native Inputs */
        .sel-btn input { position: absolute; opacity: 0; width: 0; height: 0; }

        /* Checked States */
        .sel-btn:has(input:checked) {
            background: rgba(0, 82, 204, 0.04);
            border-color: #0052cc;
        }
        .sel-btn:has(input:checked) .sel-btn-text { color: #0052cc; }
        
        .sel-btn:has(input[type="radio"]:checked) .sel-btn-circle {
            border-color: #0052cc;
            background: #0052cc;
        }
        .sel-btn:has(input[type="radio"]:checked) .sel-btn-circle::after { transform: scale(1); }

        .sel-btn:has(input[type="checkbox"]:checked) .sel-btn-square {
            border-color: #0052cc;
            background: #0052cc;
        }
        .sel-btn:has(input[type="checkbox"]:checked) .sel-btn-square svg { display: block; }

        /* Slider Control */
        .slider-container { padding: 8px 0 4px; }
        .range-slider {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #e1e8ed;
            outline: none;
            margin: 14px 0;
        }
        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #0052cc;
            cursor: pointer;
            border: 2px solid #ffffff;
            box-shadow: 0 3px 8px rgba(0,82,204,0.3);
            transition: transform 0.1s;
        }
        .range-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
        .slider-labels { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; color: #78909c; }

        /* Counter text for dynamic tracking */
        .counter-badge {
            float: right;
            font-size: 11px;
            background: #eceff1;
            padding: 2px 6px;
            border-radius: 6px;
            color: #546e7a;
            font-weight: 700;
        }

        /* Buttons Styling */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #0052cc, #0040a8);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 82, 204, 0.15);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(0, 82, 204, 0.22);
            background: linear-gradient(135deg, #005ce6, #0047bc);
        }
        .btn-primary:active { transform: translateY(1px); }

        .action-container { margin-top: 12px; margin-bottom: 24px; }

        /* Floating Graphic Elements for Medical Vibe */
        .floating-char {
            position: fixed;
            z-index: -1;
            pointer-events: none;
            opacity: 0.8;
            transition: transform 0.4s ease-out;
        }
        #charA { top: 12%; left: 8%; animation: float-char-a 8s infinite ease-in-out; }
        #charB { top: 25%; right: 7%; animation: float-char-b 10s infinite ease-in-out; }
        #charC { bottom: 18%; left: 6%; animation: float-char-c 9s infinite ease-in-out; }
        #charD { bottom: 12%; right: 9%; animation: float-char-d 11s infinite ease-in-out; }
        #charE { top: 45%; left: 4%; animation: float-char-e 12s infinite ease-in-out; }
        #charF { top: 62%; right: 5%; animation: float-char-f 7s infinite ease-in-out; }
        #charG { bottom: 40%; left: 9%; animation: float-char-g 9.5s infinite ease-in-out; }
        #charH { top: 78%; left: 5%; animation: float-char-h 10.5s infinite ease-in-out; }

        @keyframes float-char-a { 0%,100%{transform:translateY(0) rotate(0deg)}  50%{transform:translateY(-10px) rotate(4deg)} }
        @keyframes float-char-b { 0%,100%{transform:translateY(0) rotate(0deg)}  50%{transform:translateY(-12px) rotate(-5deg)} }
        @keyframes float-char-c { 0%,100%{transform:translateY(0) rotate(0deg)}  50%{transform:translateY(-9px) rotate(3deg)} }
        @keyframes float-char-d { 0%,100%{transform:translateY(0) rotate(0deg)}  50%{transform:translateY(-11px) rotate(-4deg)} }
        @keyframes float-char-e { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-7px) rotate(2deg)} }
        @keyframes float-char-f { 0%,100%{transform:translateY(0) rotate(2deg)}  50%{transform:translateY(-8px) rotate(-2deg)} }
        @keyframes float-char-g { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-8px) rotate(2deg)} }
        @keyframes float-char-h { 0%,100%{transform:translateY(0) rotate(2deg)}  50%{transform:translateY(-7px) rotate(-2deg)} }

        .fc-wrap { position:fixed; width:64px; pointer-events:none; display:flex; flex-direction:column; align-items:center; opacity:0.9; }
        .fc-wrap svg { width:58px; height:58px; filter:drop-shadow(0 6px 14px rgba(0,51,102,0.18)); }
        .fc-wrap span { display:none; }

        @media (max-width: 900px) {
            .fc-wrap { display:none; }
        }
    </style>
</head>
<body>

    <div class="medical-bg"></div>
    <div class="medical-grid"></div>

    <div id="customAlert" class="custom-alert">
        <div class="custom-alert-icon" id="customAlertIcon"></div>
        <div class="custom-alert-message" id="customAlertMessage"></div>
    </div>

    <div class="app-container">
        
        <div id="startScreen" class="app-screen">
            <div class="welcome-card">
                <div class="brand-logo-container">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c
